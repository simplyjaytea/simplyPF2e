name: Release

# Publishes Foundry-installable assets. Four ways to ship an update:
#
#   1. Push a tag like v0.1.1. The workflow creates the GitHub release
#      itself and attaches assets.
#   2. Actions -> Release -> "Run workflow", enter a version like 0.1.1.
#      Same as above, without needing a local checkout.
#   3. Draft and publish a release by hand with a tag like v0.1.1; the
#      workflow fires on publish and attaches the assets.
#   4. Called as a reusable workflow (workflow_call, with a "version" input)
#      by auto-release.yml on every merge to main. Reusable-workflow calls
#      run in the SAME workflow-run graph as their caller, so this is the
#      only one of the four paths a workflow can trigger on another
#      workflow's behalf — a tag pushed BY a workflow using the default
#      GITHUB_TOKEN does NOT fire this workflow's own `push: tags` trigger
#      (GitHub suppresses event-triggered runs started by GITHUB_TOKEN, to
#      stop infinite trigger loops), so auto-release.yml can't just push a
#      tag and rely on path 1 — it has to call in via this path instead.
#
# The manifest URL advertised to users never changes:
#   https://github.com/simplyjaytea/simplyPF2e/releases/latest/download/module.json
# GitHub's "latest/download" redirect always serves the newest release, so the
# install link in the README keeps working forever. (It only resolves once at
# least one release exists.) Each release's module.json gets its `download`
# pinned to that specific version, which lets Foundry offer updates and lets
# users roll back to old versions if needed.

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 0.1.1 (the tag becomes v0.1.1)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "Version to publish, e.g. 0.1.1 (the tag becomes v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            TAG="v${INPUT_VERSION#v}"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create the release (tag pushes and manual runs)
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes

      - name: Stamp version and download URL into module.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          jq --arg version "$VERSION" \
             --arg manifest "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/module.json" \
             --arg download "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/module.zip" \
             '.version = $version | .manifest = $manifest | .download = $download' \
             module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Build module archive
        run: zip -r module.zip module.json LICENSE README.md lang scripts styles templates

      - name: Attach assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" module.json module.zip --clobber
