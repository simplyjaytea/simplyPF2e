name: Release

# Publishes Foundry-installable assets whenever a GitHub release is published.
#
# The manifest URL advertised to users never changes:
#   https://github.com/simplyjaytea/simplyPF2e/releases/latest/download/module.json
# GitHub's "latest/download" redirect always serves the newest release, so the
# install link in the README keeps working forever. Each release's module.json
# gets its `download` pinned to that specific version, which lets Foundry
# offer updates and lets users roll back to old versions if needed.
#
# To ship an update: bump nothing by hand — just create a release with a tag
# like v0.2.0 and this workflow stamps the version into module.json for you.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version and download URL into module.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg version "$VERSION" \
             --arg manifest "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/module.json" \
             --arg download "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/module.zip" \
             '.version = $version | .manifest = $manifest | .download = $download' \
             module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Build module archive
        run: zip -r module.zip module.json LICENSE README.md lang scripts styles templates

      - name: Attach assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" module.json module.zip --clobber
