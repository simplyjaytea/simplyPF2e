name: Auto Release

# Every push to main gets its own release — no manual tag/version step ever
# needed. Computes the next version by bumping the LAST dot-segment of the
# latest existing tag (works whether that tag is "vX.Y.Z" or this repo's
# "vX.Y.Z.W" hotfix style, e.g. v0.3.4.5 -> v0.3.4.6), then pushes that tag.
# Pushing the tag triggers the existing release.yml (on: push: tags: v*),
# which builds and publishes the release — this workflow does nothing else.
#
# Runs queued (concurrency, no cancel-in-progress) so two merges landing
# close together compute/push tags one at a time instead of racing on the
# same "latest tag".

on:
  push:
    branches: [main]

concurrency:
  group: auto-release-tag
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push next version tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          LATEST=$(git tag --list 'v*' | sort -V | tail -1)
          LATEST="${LATEST:-v0.0.0}"
          BASE="${LATEST%.*}"
          LAST="${LATEST##*.}"
          NEW_TAG="${BASE}.$((LAST + 1))"
          echo "Latest tag: $LATEST -> new tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
